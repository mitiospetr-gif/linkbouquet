<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — LinkBouquet</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">
    <div class="auth-bg">
        <img src="images/bouquets/romantic1.webp" alt="" class="auth-bg-img">
        <div class="auth-bg-overlay"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <span class="logo-text">LinkBouquet</span>
                <span class="logo-flower">🌸</span>
            </div>
            <h2 class="auth-title">Вход в личный кабинет</h2>
            
            <button id="googleSignIn" class="btn-google">
                <svg class="google-icon" viewBox="0 0 24 24">
                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                </svg>
                Войти через Google
            </button>

            <div class="auth-divider"><span>или</span></div>

            <form id="emailAuthForm" class="email-auth-form">
                <div class="form-group">
                    <label for="authEmail">Email</label>
                    <input type="email" id="authEmail" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="authPassword">Пароль</label>
                    <input type="password" id="authPassword" required placeholder="••••••••">
                </div>
                <div class="auth-actions">
                    <button type="submit" id="signInBtn" class="btn-create">Войти</button>
                    <button type="button" id="signUpBtn" class="btn-secondary">Регистрация</button>
                </div>
            </form>
        </div>
        <a href="/" class="back-link">← На главную</a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('googleSignIn').addEventListener('click', signInWithGoogle);
        document.getElementById('emailAuthForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const success = await signInWithEmail(email, password);
            if (success) window.location.href = '/dashboard.html';
        });
        document.getElementById('signUpBtn').addEventListener('click', async () => {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            await signUpWithEmail(email, password);
        });
    </script>
</body>
</html>
