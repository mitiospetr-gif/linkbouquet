<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — LinkBouquet</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="auth-page">
    <div class="auth-bg">
        <img src="images/bouquets/romantic1.webp" alt="" class="auth-bg-img">
        <div class="auth-bg-overlay"></div>
    </div>

    <div class="auth-container">
        <div class="auth-card">
            <div class="logo">
                <span class="logo-text">LinkBouquet</span>
                <span class="logo-flower">🌸</span>
            </div>
            <h2 class="auth-title">Вход в личный кабинет</h2>
            
            <form id="emailAuthForm" class="email-auth-form">
                <div class="form-group">
                    <label for="authEmail">Email</label>
                    <input type="email" id="authEmail" required placeholder="your@email.com">
                </div>
                <div class="form-group">
                    <label for="authPassword">Пароль</label>
                    <input type="password" id="authPassword" required placeholder="••••••••">
                </div>
                <div class="auth-actions">
                    <button type="submit" id="signInBtn" class="btn-create">Войти</button>
                    <button type="button" id="signUpBtn" class="btn-secondary">Регистрация</button>
                </div>
            </form>
        </div>
        <a href="/" class="back-link">← На главную</a>
    </div>

    <script src="js/config.js"></script>
    <script src="js/supabase.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.getElementById('emailAuthForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            const success = await signInWithEmail(email, password);
            if (success) window.location.href = '/dashboard.html';
        });
        document.getElementById('signUpBtn').addEventListener('click', async () => {
            const email = document.getElementById('authEmail').value;
            const password = document.getElementById('authPassword').value;
            await signUpWithEmail(email, password);
        });
    </script>
</body>
</html>
